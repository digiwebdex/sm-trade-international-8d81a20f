<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect to critical origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://ggwpmrrtqocjcsnwqxze.supabase.co" />

    <!-- Preload critical assets -->
    <link rel="preload" as="image" href="/src/assets/hero-bg.jpg" fetchpriority="high" />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" /></noscript>

    <!-- Critical inline CSS for instant first paint -->
    <style>
      /* App shell styles — mirrors the real layout so there's zero layout shift */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      body{font-family:system-ui,-apple-system,sans-serif;background:#f8f6f2;color:#1e293b}
      .shell-topbar{background:hsl(220 60% 20%);color:hsl(40 30% 96%);padding:8px 0;font-size:14px}
      .shell-topbar-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between}
      .shell-navbar{position:sticky;top:0;z-index:50;background:#f8f6f2;border-bottom:1px solid transparent;height:64px;display:flex;align-items:center}
      .shell-navbar-inner{max-width:1280px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px;width:100%}
      .shell-logo{height:40px;width:auto;border-radius:4px}
      .shell-brand{font-weight:700;font-size:20px;font-family:Montserrat,system-ui,sans-serif}
      .shell-hero{position:relative;overflow:hidden;background:hsl(222 47% 11%);min-height:500px;display:flex;align-items:center;justify-content:center}
      .shell-hero-text{position:relative;z-index:2;max-width:600px;padding:64px 16px;text-align:center}
      .shell-hero-text h1{color:#fff;font-size:clamp(28px,5vw,48px);font-weight:700;line-height:1.1;margin-bottom:16px;font-family:Montserrat,system-ui,sans-serif}
      .shell-hero-text p{color:rgba(255,255,255,.6);font-size:18px;line-height:1.6;font-family:'DM Sans',system-ui,sans-serif}
      .shell-spinner{display:flex;align-items:center;justify-content:center;padding:48px 0}
      .shell-spinner::after{content:'';width:32px;height:32px;border:2px solid rgba(0,0,0,.1);border-top-color:hsl(220 60% 20%);border-radius:50%;animation:spin .6s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      /* Hide shell once React mounts */
      #app-shell{transition:opacity .2s ease}
      .app-mounted #app-shell{opacity:0;pointer-events:none;position:absolute}
    </style>
  </head>

  <body>
    <!-- Static app shell — visible instantly, hidden when React mounts -->
    <div id="app-shell">
      <div class="shell-topbar">
        <div class="shell-topbar-inner">
          <span>+88 01867666888 &nbsp; | &nbsp; smtrade.int94@gmail.com</span>
          <span style="font-size:12px;border:1px solid rgba(255,255,255,.3);padding:2px 10px;border-radius:4px">বাংলা</span>
        </div>
      </div>
      <div class="shell-navbar">
        <div class="shell-navbar-inner">
          <img src="/src/assets/logo-sm.webp" alt="S. M. Trade International" class="shell-logo" />
          <div style="width:1px;height:28px;background:rgba(200,170,80,.4)"></div>
          <span class="shell-brand">S. M. Trade International</span>
        </div>
      </div>
      <div class="shell-hero">
        <div class="shell-hero-text">
          <h1>Premium Customized Corporate Gifts & Promotional Products</h1>
          <p>We customize your brand identity with quality, precision and professionalism.</p>
        </div>
      </div>
      <div class="shell-spinner"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
